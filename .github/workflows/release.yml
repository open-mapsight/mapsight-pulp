name: Release Packages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    tags:
      - '**'

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@9e72090525849c5e82e596468b86eb55e9cc5401 # 2.32.0
        with:
          php-version: '8.2'
          extensions: mbstring, xml, soap
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist
      - name: Run tests
        run: composer test

  release_packages:
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        package:
          - geojson-reproject
          - pulp
          - pulp-cache
          - pulp-concert
          - pulp-geocsv
          - pulp-geojson
          - pulp-gtfs
          - pulp-json
          - pulp-soap
          - pulp-tic
          - pulp-xml
          - pulp-zip

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve Package Release
        id: release
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" != "tag" ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          package="${GITHUB_REF_NAME%%/*}"
          version="${GITHUB_REF_NAME#*/}"

          if [[ "$GITHUB_REF_NAME" != */* || -z "$package" || -z "$version" ]]; then
            echo "::error::Package release tags must use <package>/v<version>, for example pulp-json/v1.1.0."
            exit 1
          fi

          if [[ "$package" != "${{ matrix.package }}" ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "tag=$version" >> "$GITHUB_OUTPUT"

      - name: Check Existing Split Tag
        id: existing_tag
        if: steps.release.outputs.publish == 'true' && steps.release.outputs.tag != ''
        shell: bash
        run: |
          if git ls-remote --exit-code --tags "https://github.com/open-mapsight/${{ matrix.package }}.git" "refs/tags/${{ steps.release.outputs.tag }}" > /dev/null 2>&1; then
            echo "::notice::open-mapsight/${{ matrix.package }} already has tag ${{ steps.release.outputs.tag }}; skipping split tag creation."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Split and Push ${{ matrix.package }}
        if: steps.release.outputs.publish == 'true' && steps.existing_tag.outputs.exists != 'true'
        uses: danharrin/monorepo-split-github-action@14e42e2437f674b8987c1f50ca3689116aea1893 # v2.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        with:
          package_directory: 'packages/${{ matrix.package }}'
          repository_organization: 'open-mapsight'
          repository_name: '${{ matrix.package }}'
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          branch: "main"
          tag: ${{ steps.release.outputs.tag }}

      - name: Notify Packagist
        if: steps.release.outputs.publish == 'true' && steps.existing_tag.outputs.exists != 'true'
        env:
          PACKAGIST_USER: ${{ secrets.PACKAGIST_USER }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
          PACKAGE_NAME: ${{ matrix.package }}
        run: curl -XPOST -H'Content-Type:application/json' "https://packagist.org/api/update-package?username=$PACKAGIST_USER&apiToken=$PACKAGIST_TOKEN" -d "{\"repository\":\"https://github.com/open-mapsight/$PACKAGE_NAME\"}"
